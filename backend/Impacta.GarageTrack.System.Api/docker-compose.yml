services:
  impacta.garagetrack.system.api:
    image: ${DOCKER_REGISTRY-}impactagaragetracksystemapi
    build:
      context: .
      dockerfile: Impacta.GarageTrack.System.Api/Dockerfile
    networks:
      - garagetrack-network

  db:
    image: postgres:15-alpine
    container_name: garagetrack-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=garagetrackdb
    volumes:
      - postgres-data-garage:/var/lib/postgresql/data
    ports:
      - "5434:5432"  
    networks:
      - garagetrack-network

volumes:
  postgres-data-garage:

networks:
  garagetrack-network:
    name: garagetrack-network
    driver: bridge
    external: false 
